<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Budget App</title>
		<link rel="stylesheet" href="public/style.css">
	</head>

 
	<body>
		<section class="main-window">
			
			<div class="login-window">
				<div class="logo">
					<img src="/img/logo.png" alt="">
					<h2>Budget App</h2>
				</div>
				<form action="" class="login-form">
					<label for="email"></label>
					<input type="text" id="email" name="email" placeholder="Login"></br>
					<label for="password"></label>
					<input type="password" id="password" name="password" placeholder="password">
				</form>

				<div class="remeber">
					<input type="checkbox"><label for=""> Remeber me</label>
				</div>

				<div class="button">
					<button type="button">Log in</button>
				</div>

				<div class="reset-register">
					<span>Forgot password? <a href="">Reset password</a></span>
					<span>No account? <a href="">Register</a></span>
				</div>
				
			</div>
		</section>
	</body>
</html>
