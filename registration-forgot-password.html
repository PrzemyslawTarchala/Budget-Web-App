<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Register-Forgot-Password</title>
		<link rel="stylesheet" href="./Style/style-registration-forgot-password.css">
		<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
	</head>
	
	
	<body>
		<header>
			<div class="logo">
				<img src="./Image/logo.png" alt="savings" width="64px" height="64px">
				<h2>Fix your wallet</h2>
			</div>
			<nav class="navbar">
				<ul>
					<li><a href="./mission.html">Mission</a></li>
					<li><a href="./about.html">About</a></li>
					<li><a href="./index.html">Login</a></li>
				</ul>
			</nav>
		</header>

		<main>
			<section class="container-register-forgot-password">
				<div class="field">
					<div class="input-field">
						<div class="action-title">
							<h3>Registration</h3>
						</div>
						<div class="input">
							<div class="input-box">
								<input type="text" placeholder="Name" required>
								<i class='bx bxs-face'></i>
							</div>
							<div class="input-box">
								<input type="text" placeholder="Email" required>
								<i class='bx bx-envelope' ></i>
							</div>
							<div class="input-box">
								<input type="password" placeholder="Password" required>
								<i class='bx bxs-lock-alt' ></i>
							</div>

							<div class="input-box">
								<input type="password" placeholder="Same Password" required>
								<i class='bx bxs-lock-alt' ></i>
							</div>
							<div class="login btn">
								<button type="submit">Register</button>
								<p>Have already account? <a href="./index.html">Login</a></p>
							</div>
						</div>
					</div>
					<div class="input-field">		
						<div class="action-title">
							<h3>Reset password</h3>
						</div>
						<div class="input-reset">
							<div class="input-box">
								<input type="text" placeholder="Email" required>
								<i class='bx bx-envelope' ></i>
							</div>
							<div class="login btn">
								<button type="submit">Reset password</button>
							</div>							
						</div>
					</div>
				</div>
			</section>
		</main>

	</body>
</html>
